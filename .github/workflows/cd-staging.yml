# ============================================================================
# CD Pipeline - Staging Deployment
# ============================================================================
# Triggers: push para branch develop
# Deploy para: Ambiente de Staging
# ============================================================================

name: CD - Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/Version to deploy'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend
  ENVIRONMENT: staging

jobs:
  # ==========================================================================
  # Build & Push Docker Images
  # ==========================================================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Generate version tag
        id: version
        run: |
          VERSION="staging-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: 🏷️ Extract Backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest
            type=sha,prefix=staging-

      - name: 🔨 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      # Frontend
      - name: 🏷️ Extract Frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest
            type=sha,prefix=staging-

      - name: 🔨 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./erp-frontend
          file: ./erp-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VITE_API_URL=${{ secrets.STAGING_API_URL }}

  # ==========================================================================
  # Deploy to Staging
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_BACKEND: ${{ env.IMAGE_BACKEND }}
          IMAGE_FRONTEND: ${{ env.IMAGE_FRONTEND }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          envs: VERSION,REGISTRY,IMAGE_BACKEND,IMAGE_FRONTEND
          script: |
            echo "🚀 Deploying ERP Móveis to STAGING"
            echo "📦 Version: ${VERSION}"
            
            # Create deployment directory
            mkdir -p ~/erp-staging
            cd ~/erp-staging
            
            # Login to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker pull ${REGISTRY}/${IMAGE_BACKEND}:${VERSION}
            docker pull ${REGISTRY}/${IMAGE_FRONTEND}:${VERSION}
            
            # Update docker-compose
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            services:
              postgres:
                image: postgres:17-alpine
                environment:
                  POSTGRES_DB: ${{ secrets.STAGING_DB_NAME }}
                  POSTGRES_USER: ${{ secrets.STAGING_DB_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                restart: unless-stopped
              
              backend:
                image: ${REGISTRY}/${IMAGE_BACKEND}:${VERSION}
                environment:
                  SPRING_PROFILES_ACTIVE: staging
                  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${{ secrets.STAGING_DB_NAME }}
                  SPRING_DATASOURCE_USERNAME: ${{ secrets.STAGING_DB_USER }}
                  SPRING_DATASOURCE_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
                  JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
                ports:
                  - "8080:8080"
                depends_on:
                  - postgres
                restart: unless-stopped
              
              frontend:
                image: ${REGISTRY}/${IMAGE_FRONTEND}:${VERSION}
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                restart: unless-stopped
            
            volumes:
              postgres-data:
            EOF
            
            # Deploy
            docker-compose down
            docker-compose up -d
            
            # Cleanup old images
            docker image prune -af --filter "until=72h"
            
            echo "✅ Deployment completed!"

      - name: 🏥 Health Check
        run: |
          echo "🏥 Waiting for services to be healthy..."
          sleep 30
          
          # Check backend
          for i in {1..10}; do
            if curl -f ${{ secrets.STAGING_API_URL }}/actuator/health; then
              echo "✅ Backend is healthy"
              break
            fi
            echo "⏳ Attempt $i/10 - waiting..."
            sleep 10
          done
          
          # Check frontend
          if curl -f ${{ secrets.STAGING_URL }}; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend health check failed"
            exit 1
          fi

      - name: 📢 Notify Success
        if: success()
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║          ✅ STAGING DEPLOYMENT SUCCESSFUL                ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 URL: ${{ secrets.STAGING_URL }}"
          echo "📦 Version: ${{ needs.build-and-push.outputs.version }}"
          echo "🕐 Time: $(date)"

      - name: 🔴 Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            echo "🔴 Deployment failed! Rolling back..."
            cd ~/erp-staging
            docker-compose down
            # Restore previous version (implement your rollback strategy)
            echo "❌ Deployment rolled back"
